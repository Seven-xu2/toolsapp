spring:
  datasource:
    url: jdbc:h2:mem:toolsapp;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

app:
  jwt:
    secret: test-secret-test-secret-test-secret-12345
    expiration-seconds: 604800
